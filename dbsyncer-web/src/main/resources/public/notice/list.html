<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">告警通知</h3>
        <p class="text-xs text-tertiary"></p>
    </div>
    <div class="card-body">
        <h3 class="card-title">触发条件</h3>
        <p class="text-xs text-tertiary">间隔10分钟：1.驱动有失败数据; 2.手动停止驱动; 3.连接离线。</p>
        <form id="notice-form-edit">
            <!-- 管理员操作区域 -->
            <div class="form-actions mb-4">
                <button id="testNoticeBtn" type="button" class="btn btn-default" th:if="${config?.wechat != null and (config?.wechat?.enabled || config?.dingTalk?.enabled || config?.http?.enabled || config?.mail?.enabled)}">
                    <span class="fa fa-flash"></span> 测试
                </button>
                <button id="updateNoticeBtn" type="button" class="btn btn-primary">
                    <span class="fa fa-save"></span> 保存
                </button>
            </div>

            <!-- 告警通知配置区域 -->
            <div class="grid grid-cols-2">

                <!-- 企业微信配置区域 -->
                <div class="form-item">
                    <label class="form-label">企业微信</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="enableWechat" type="checkbox" th:checked="${config?.wechat?.enabled}"/>
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item"></div>

                <div class="form-item wechat-config hidden">
                    <label class="form-label">@所有人</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="wechatAtAll" type="checkbox" th:checked="${config?.wechat?.atAll}" />
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item wechat-config hidden">
                    <label class="form-label">@用户手机号</label>
                    <div class="form-control-area">
                        <input type="text" class="form-control" maxlength="200" name="wechatAtMobiles" data-role="tagsinput" placeholder="182xxxx1234" th:value="${config?.wechat?.atMobiles}"/>
                    </div>
                </div>

                <div class="form-item wechat-config hidden">
                    <label class="form-label">webhook<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <textarea name="wechatWebhookUrl" required class="form-control" maxlength="200" rows="3" placeholder="企业微信机器人webhook地址">[[${config?.wechat?.webhookUrl}]]</textarea>
                    </div>
                </div>
                <div class="form-item wechat-config hidden"></div>

                <!-- 钉钉配置区域 -->
                <div class="form-item">
                    <label class="form-label">钉钉</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="enableDingTalk" type="checkbox" th:checked="${config?.dingTalk?.enabled}"/>
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item"></div>

                <div class="form-item dingtalk-config hidden">
                    <label class="form-label">@所有人</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="dingTalkAtAll" type="checkbox" th:checked="${config?.dingTalk?.atAll}" />
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item dingtalk-config hidden">
                    <label class="form-label">@用户手机号</label>
                    <div class="form-control-area">
                        <input type="text" class="form-control" maxlength="200" name="dingTalkAtMobiles" data-role="tagsinput" placeholder="182xxxx1234" th:value="${config?.dingTalk?.atMobiles}"/>
                    </div>
                </div>

                <div class="form-item dingtalk-config hidden">
                    <label class="form-label">webhook<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <textarea name="dingTalkWebhookUrl" required class="form-control" maxlength="200" rows="3" placeholder="钉钉机器人webhook地址">[[${config?.dingTalk?.webhookUrl}]]</textarea>
                    </div>
                </div>
                <div class="form-item dingtalk-config hidden"></div>

                <!-- HTTP配置区域 -->
                <div class="form-item">
                    <label class="form-label">HTTP</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="enableHttp" type="checkbox" th:checked="${config?.http?.enabled}"/>
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item"></div>
                <div class="form-item http-config hidden">
                    <label class="form-label">url<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <textarea name="httpUrl" required class="form-control" maxlength="200" rows="3" placeholder="回调http地址">[[${config?.http?.url}]]</textarea>
                    </div>
                </div>
                <div class="form-item http-config hidden"></div>

                <!-- 邮件配置区域 -->
                <div class="form-item">
                    <label class="form-label">邮件</label>
                    <div class="form-control-area">
                        <label class="form-switch">
                            <input name="enableMail" type="checkbox" th:checked="${config?.mail?.enabled}"/>
                            <span class="switch-track">
                                <span class="switch-option switch-option-on">Yes</span>
                                <span class="switch-option switch-option-off">No</span>
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-item"></div>

                <div class="form-item mail-config hidden">
                    <label class="form-label">账号<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <input type="text" class="form-control" maxlength="100" name="mailAccount" required th:value="${config?.mail?.account}"/>
                    </div>
                </div>
                <div class="form-item mail-config hidden">
                    <label class="form-label">Code<strong class="text-primary">*</strong><i class="fa fa-question-circle" title="发邮件的Code,不是邮箱密码，示例：wqoxxxxxxdflbbig"></i></label>
                    <div class="form-control-area">
                        <input type="text" class="form-control" maxlength="100" name="mailCode" required th:value="${config?.mail?.code}"/>
                    </div>
                </div>

            </div>

        </form>
        <div class="blank-block-md"></div>

    </div>
</div>

<script>
    $(function () {
        // 定义切换显示/隐藏的函数
        function toggleConfigItems(checked, items) {
            if (checked) {
                items.show();
            } else {
                items.hide();
            }
        }
        function initSwitchToggle(switchName, config) {
            const switchElement = $('input[name="'+switchName+'"]')
            let switchApi = initSwitch(switchElement, function(checked) {
                toggleConfigItems(checked, config);
            });
            toggleConfigItems(switchApi.isChecked(), config);
        }
        initSwitchToggle('enableMail', $('.mail-config'));
        initSwitchToggle('enableHttp', $('.http-config'));
        initSwitchToggle('enableWechat', $('.wechat-config'));
        initSwitchToggle('enableDingTalk', $('.dingtalk-config'));
        // 绑定多值输入框事件
        initMultipleInputTags();
        //保存
        $("#updateNoticeBtn").click(function () {
            const $form = $("#notice-form-edit");
            if (validateForm($form)) {
                const submitBtn = $(this);
                const originalText = submitBtn.html();
                submitBtn.html('<i class="fa fa-spinner fa-spin"></i> 保存中...').prop('disabled', true);
                doPoster('/notice/edit', $form.serializeJson(), function (response) {
                    submitBtn.html(originalText).prop('disabled', false);
                    if (response.success === true) {
                        bootGrowl("修改成功!", "success");
                        doLoader("/notice");
                    } else {
                        bootGrowl(response.message, "danger");
                    }
                });
            }
        });

        // 测试
        $("#testNoticeBtn").click(function () {
            const submitBtn = $(this);
            const originalText = submitBtn.html();
            submitBtn.html('<i class="fa fa-spinner fa-spin"></i> 测试中...').prop('disabled', true);
            doPoster('/notice/test', {}, function (response) {
                submitBtn.html(originalText).prop('disabled', false);
                if (response.success === true) {
                    bootGrowl("测试成功!", "success");
                    doLoader("/notice");
                } else {
                    bootGrowl(response.message, "danger");
                }
            });
        });

    })
</script>
</html>
