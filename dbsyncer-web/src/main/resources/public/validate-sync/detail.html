<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<!-- 校验结果详情 -->
<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">校验结果详情</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-end mb-4">
            <div class="lg:col-span-2 form-item mb-0">
                <label class="form-label">选择任务</label>
                <select id="detailTaskSelect" class="form-control">
                    <option th:each="t : ${taskList}" th:value="${t.id}" th:text="${t.name}" th:selected="${t.id == taskId}"></option>
                </select>
            </div>
            <div class="lg:col-span-2 form-item mb-0">
                <label class="form-label">状态</label>
                <select id="detailStatusFilter" class="form-control">
                    <option value="" th:selected="${detailStatus == null or detailStatus == ''}">全部</option>
                    <option value="success" th:selected="${detailStatus == 'success'}">正常</option>
                    <option value="fail" th:selected="${detailStatus == 'fail'}">异常</option>
                </select>
            </div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button type="button" class="btn btn-outline" onclick="backIndexPage()">
                    <i class="fa fa-reply"></i> 返回列表
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th class="width50px"></th>
                <th>校验类型</th>
                <th>数据源表</th>
                <th>目标源表</th>
                <th>总数</th>
                <th>差异数</th>
                <th>已订正</th>
                <th>更新时间</th>
                <th class="width80px">查看详情</th>
            </tr>
            </thead>
            <tbody id="detail-result-table"></tbody>
        </table>
        <div class="blank-block"></div>
    </div>
</div>

<script th:src="@{/js/validate-sync/validate-sync-detail.js}"></script>
<script th:inline="javascript">
    $(document).ready(function () {
        initValidateSyncDetailPage({
            taskId: /*[[${taskId}]]*/ ''
        });
    });
</script>
</html>
