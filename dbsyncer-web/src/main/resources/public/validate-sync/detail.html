<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<!-- 校验结果详情 -->
<div class="form-container">
    <style>
        .diff-table {
            table-layout: fixed;
            width: 100%;
        }

        .diff-table > tbody > tr > td {
            max-width: none;
            white-space: normal;
            overflow: visible;
            text-overflow: unset;
            vertical-align: top;
        }

        .diff-table .diff-exception-cell {
            padding: 10px 12px;
        }

        .diff-table .diff-msg-cell {
            max-height: 240px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .diff-table .diff-msg-plain {
            color: var(--text-secondary);
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .diff-table .diff-field-table-wrap {
            border: 1px solid var(--border-secondary, #e5e7eb);
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg-primary, #fff);
        }

        .diff-table .diff-field-table {
            width: 100%;
            margin: 0;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: var(--font-size-sm, 13px);
        }

        .diff-table .diff-field-table th,
        .diff-table .diff-field-table td {
            padding: 8px 10px;
            vertical-align: middle;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .diff-table .diff-field-table thead th {
            background: var(--bg-secondary, #f9fafb);
            color: var(--text-secondary, #6b7280);
            font-weight: 600;
            font-size: 12px;
            border-bottom: 1px solid var(--border-secondary, #e5e7eb);
            text-align: center;
        }

        .diff-table .diff-field-table thead th:first-child {
            text-align: left;
        }

        .diff-table .diff-field-table tbody td {
            border-bottom: 1px solid var(--border-tertiary, #f3f4f6);
            color: var(--text-primary, #111827);
        }

        .diff-table .diff-field-table tbody tr:last-child td {
            border-bottom: none;
        }

        .diff-table .diff-field-table tbody tr:hover {
            background: var(--bg-tertiary, #f9fafb);
        }

        .diff-table .diff-field-table tbody td:first-child {
            font-weight: 600;
            font-family: var(--font-mono, ui-monospace, monospace);
            color: var(--text-primary, #111827);
        }

        .diff-table .diff-field-table .diff-val-source,
        .diff-table .diff-field-table .diff-val-target {
            font-family: var(--font-mono, ui-monospace, monospace);
            text-align: center;
        }

        .diff-table .diff-field-table .diff-val-source {
            color: var(--primary-color, #2563eb);
        }

        .diff-table .diff-field-table .diff-val-target {
            color: var(--error-color, #dc2626);
            font-weight: 600;
        }

        .diff-table .diff-source-table-cell {
            white-space: normal;
            word-break: break-word;
            line-height: 1.5;
        }

        .confirm-body .validate-diff-detail-body {
            white-space: normal;
        }

        .confirm-title-extra .diff-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px 12px;
        }

        .confirm-title-extra .diff-summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .confirm-title-extra .diff-summary-item label {
            font-weight: 500;
            color: var(--text-secondary, #6b7280);
            white-space: nowrap;
        }
    </style>

    <div class="card-header">
        <h3 class="card-title text-center">校验结果详情</h3>
    </div>
    <div class="card-body">
        <!-- 顶部操作区：任务选择 + 返回按钮 -->
        <div class="grid grid-cols-6 items-center mb-4">
            <div class="lg:col-span-2 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">选择任务</label>
                <select id="detailTaskSelect" class="form-control">
                    <option th:each="t : ${taskList}" th:value="${t.id}" th:text="${t.name}" th:selected="${t.id == taskId}"></option>
                </select>
            </div>
            <div class="lg:col-span-2 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">状态</label>
                <select id="detailStatusFilter" class="form-control">
                    <option value="" th:selected="${detailStatus == null or detailStatus == ''}">全部</option>
                    <option value="success" th:selected="${detailStatus == 'success'}">正常</option>
                    <option value="fail" th:selected="${detailStatus == 'fail'}">异常</option>
                </select>
            </div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button class="btn btn-outline" onclick="backIndexPage()">
                    <i class="fa fa-reply"></i> 返回列表
                </button>
            </div>
        </div>

        <!-- 结果列表 -->
        <table class="table">
            <thead>
            <tr>
                <th style="width: 50px;"></th>
                <th>校验类型</th>
                <th>数据源表</th>
                <th>目标源表</th>
                <th>总数</th>
                <th>差异数</th>
                <th>已订正</th>
                <th>更新时间</th>
                <th style="width: 80px;">查看详情</th>
            </tr>
            </thead>
            <tbody id="detail-result-table"></tbody>
        </table>
        <div class="blank-block"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        window.backIndexPage = function () {
            doLoader('/validate-sync/list');
        };

        var currentTaskId = '[[${taskId}]]';
        var currentDetailId = '';
        var manualReviseSubmitting = false;
        var diffModalInstance = null;

        // 初始化任务下拉组件
        var taskSelect = $('#detailTaskSelect').dbSelect({
            type: 'single',
            onSelect: function (selected) {
                var selectedId = selected.value || selected;
                if (selectedId && selectedId !== currentTaskId) {
                    currentTaskId = selectedId;
                    doLoader('/validate-sync/page/detail?id=' + currentTaskId);
                }
            }
        });

        function getFilterValue(selector) {
            var api = $(selector).data('dbSelect');
            if (api && typeof api.getValues === 'function' && api.getValues().length > 0) {
                return api.getValues()[0] || '';
            }
            return $(selector).val() || '';
        }

        function buildSearchParams() {
            return {
                taskId: currentTaskId,
                detailStatus: getFilterValue('#detailStatusFilter')
            };
        }

        function triggerSearch() {
            resultPagination.doSearch(buildSearchParams(), 1);
        }

        function initFilterSelect(selector) {
            $(selector).dbSelect({
                type: 'single',
                onSelect: function () {
                    triggerSearch();
                }
            });
        }

        initFilterSelect('#detailStatusFilter');

        // 刷新按钮：从下拉组件获取当前选中的任务ID
        $('#refreshBtn').click(function () {
            var api = $('#detailTaskSelect').data('dbSelect');
            if (api && api.getValues().length > 0) {
                currentTaskId = api.getValues()[0];
            }
            resultPagination.doSearch(buildSearchParams());
        });

        // 清空结果按钮
        $('#clearResultBtn').click(function () {
            showConfirm({
                title: '确定要清空当前任务的所有校验结果？',
                icon: 'warning',
                size: 'large',
                confirmType: 'danger',
                onConfirm: function () {
                    doPoster('/validate-sync/clearResult', {taskId: currentTaskId}, function (response) {
                        if (response.success) {
                            bootGrowl('清空成功', 'success');
                            resultPagination.doSearch(buildSearchParams());
                        } else {
                            bootGrowl('清空失败: ' + response.message, 'danger');
                        }
                    });
                }
            });
        });

        // 校验类型中文映射
        var typeTextMap = {
            'rowData': '行数据',
            'tableSchema': '表结构',
            'index': '索引'
        };
        var typeBadgeMap = {
            'rowData': 'badge-primary',
            'tableSchema': 'badge-info',
            'index': 'badge-warning'
        };

        // 解析 content JSON
        function parseContent(contentStr) {
            try {
                return typeof contentStr === 'string' ? JSON.parse(contentStr) : contentStr;
            } catch (e) {
                return null;
            }
        }

        // 获取差异总数（优先独立列 diffTotal，兼容旧 content）
        function getDiffTotal(row) {
            if (row.diffTotal !== undefined && row.diffTotal !== null && row.diffTotal !== '') {
                var n = Number(row.diffTotal);
                if (n > 0) {
                    return '<span class="badge badge-error">' + n + '</span>';
                }
                return '<span class="badge badge-success">0</span>';
            }
            var content = parseContent(row.content);
            if (!content) return '-';
            var total = content.diffTotal || 0;
            if (total > 0) {
                return '<span class="badge badge-error">' + total + '</span>';
            }
            return '<span class="badge badge-success">0</span>';
        }

        // 获取已订正数（独立列 fixedTotal；兼容旧 content.correctedTotal）
        function getCorrectedTotal(row) {
            var total = row.fixedTotal;
            if (total === undefined || total === null) {
                var content = parseContent(row.content);
                total = content ? content.correctedTotal : 0;
            }
            total = Number(total) || 0;
            if (total > 0) {
                return '<span class="badge badge-success">' + total + '</span>';
            }
            return '<span class="text-gray-400">0</span>';
        }

        // 获取源/目标总记录数（独立列；兼容旧 content）
        function getSourceTargetCounts(row) {
            if (row.type !== 'rowData') return '<span class="text-gray-400">-</span>';
            var sourceTotal = row.sourceTotal;
            var targetTotal = row.targetTotal;
            if (sourceTotal === undefined && targetTotal === undefined) {
                var content = parseContent(row.content);
                if (content) {
                    sourceTotal = content.sourceTotal;
                    targetTotal = content.targetTotal;
                }
            }
            sourceTotal = (sourceTotal === undefined || sourceTotal === null) ? '-' : sourceTotal;
            targetTotal = (targetTotal === undefined || targetTotal === null) ? '-' : targetTotal;
            return '<span>源：' + sourceTotal + '</span><br><span>目：' + targetTotal + '</span>';
        }

        function parseDiffDetails(details) {
            if (details == null || details === '') {
                return [];
            }
            try {
                var parsed = typeof details === 'string' ? JSON.parse(details) : details;
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                return [];
            }
        }

        function formatDiffValue(value) {
            if (value === null || value === undefined || value === '') {
                return 'NULL';
            }
            return String(value);
        }

        function buildCompareDiffTable(rows, options) {
            options = options || {};
            var firstHeader = options.firstHeader || '字段';
            var firstKey = options.firstKey || 'field';
            var html = '<div class="diff-field-table-wrap"><table class="diff-field-table">'
                + '<thead><tr>'
                + '<th style="width:38%;">' + escapeHtml(firstHeader) + '</th>'
                + '<th style="width:31%;">源</th>'
                + '<th style="width:31%;">目标</th>'
                + '</tr></thead><tbody>';
            rows.forEach(function (row) {
                var firstVal = row[firstKey];
                if (firstVal === undefined || firstVal === null || firstVal === '') {
                    firstVal = row.field || '-';
                }
                html += '<tr>'
                    + '<td>' + escapeHtml(firstVal) + '</td>'
                    + '<td class="diff-val-source">' + escapeHtml(formatDiffValue(row.source)) + '</td>'
                    + '<td class="diff-val-target">' + escapeHtml(formatDiffValue(row.target)) + '</td>'
                    + '</tr>';
            });
            html += '</tbody></table></div>';
            return html;
        }

        function buildFieldDiffTable(details) {
            return buildCompareDiffTable(details, { firstHeader: '字段', firstKey: 'field' });
        }

        function parseSchemaDiffFromMsg(msg) {
            if (!msg || typeof msg !== 'string') {
                return null;
            }
            var text = msg.trim();
            var patterns = [
                { re: /^类型不一致[，,]\s*source[：:]\s*(.+?)[，,]\s*target[：:]\s*(.+)$/i, label: '类型' },
                { re: /^长度不一致[，,]\s*source[：:]\s*(.+?)[，,]\s*target[：:]\s*(.+)$/i, label: '长度' },
                { re: /^精度不一致[，,]\s*source[：:]\s*(.+?)[，,]\s*target[：:]\s*(.+)$/i, label: '精度' },
                { re: /^主键标记不一致[，,]\s*source[：:]\s*(.+?)[，,]\s*target[：:]\s*(.+)$/i, label: '主键' }
            ];
            var i;
            for (i = 0; i < patterns.length; i++) {
                var m = text.match(patterns[i].re);
                if (m) {
                    return { label: patterns[i].label, source: m[1], target: m[2] };
                }
            }
            return null;
        }

        function isSchemaDiffItem(item) {
            var type = (item && (item.type || item.objType)) || '';
            return type === '表结构' || type === 'tableSchema';
        }

        function buildDiffMsgCell(item) {
            var details = parseDiffDetails(item.details);
            var html = '<div class="diff-msg-cell">';
            if (details.length > 0) {
                html += buildFieldDiffTable(details);
            } else if (isSchemaDiffItem(item)) {
                var schemaRow = parseSchemaDiffFromMsg(item.msg);
                if (schemaRow) {
                    html += buildCompareDiffTable([schemaRow], { firstHeader: '差异项', firstKey: 'label' });
                } else {
                    html += '<div class="diff-msg-plain">' + escapeHtml(item.msg || '-') + '</div>';
                }
            } else {
                html += '<div class="diff-msg-plain">' + escapeHtml(item.msg || '-') + '</div>';
            }
            html += '</div>';
            return html;
        }

        function resetDiffModalActions() {
            currentDetailId = '';
        }

        function closeDiffDetailModal() {
            if (diffModalInstance) {
                diffModalInstance.close();
                diffModalInstance = null;
            }
            resetDiffModalActions();
        }

        function getDiffDetailConfirmBtn() {
            if (!diffModalInstance) {
                return null;
            }
            var dialog = diffModalInstance.getDialog();
            return dialog ? dialog.querySelector('.confirm-btn-confirm') : null;
        }

        function resolveDiffFixedCounts(row, content) {
            var diff = row.diffTotal;
            if (diff === undefined || diff === null || diff === '') {
                diff = content && content.diffTotal != null ? content.diffTotal : 0;
            }
            var fixed = row.fixedTotal;
            if (fixed === undefined || fixed === null || fixed === '') {
                fixed = content && content.correctedTotal != null ? content.correctedTotal : 0;
            }
            return {
                diff: Number(diff) || 0,
                fixed: Number(fixed) || 0
            };
        }

        function buildDiffSummaryTitleExtra(src, tgt, counts) {
            return '<div class="diff-summary-grid">'
                + '<div class="diff-summary-item"><label>源表</label><span class="badge badge-info">' + escapeHtml(String(src)) + '</span></div>'
                + '<div class="diff-summary-item"><label>目标</label><span class="badge badge-info">' + escapeHtml(String(tgt)) + '</span></div>'
                + '<div class="diff-summary-item"><label>差异</label><span class="badge badge-error">' + escapeHtml(String(counts.diff)) + '</span></div>'
                + '<div class="diff-summary-item"><label>已订正</label><span class="badge badge-success">' + escapeHtml(String(counts.fixed)) + '</span></div>'
                + '</div>';
        }

        function buildDiffDetailBodyHtml(data, tableNameOuter) {
            var html = '<div class="validate-diff-detail-body">';
            var headHtml = '<tr>'
                + '<th style="width:18%;">源表名称</th>'
                + '<th style="width:10%;">类型</th>'
                + '<th style="width:12%;">主键/标识</th>'
                + '<th style="width:60%;">异常</th></tr>';
            var bodyHtml = '';
            data.forEach(function (d) {
                var msgHtml = buildDiffMsgCell(d);
                var sourceTableHtml = '<div class="diff-source-table-cell">' + escapeHtml(tableNameOuter) + '</div>';
                var typeText = d.type || d.objType || '-';
                bodyHtml += '<tr>'
                    + '<td>' + sourceTableHtml + '</td>'
                    + '<td>' + escapeHtml(typeText) + '</td>'
                    + '<td>' + escapeHtml(d.key || '-') + '</td>'
                    + '<td class="diff-exception-cell">' + msgHtml + '</td>'
                    + '</tr>';
            });
            if (data.length === 0) {
                bodyHtml = '<tr><td colspan="4" class="text-center text-gray-400">无差异数据</td></tr>';
            }
            html += '<table class="table diff-table"><thead>' + headHtml + '</thead><tbody>' + bodyHtml + '</tbody></table>';
            html += '</div>';
            return html;
        }

        function openManualReviseConfirm() {
            if (!currentDetailId || manualReviseSubmitting) {
                return;
            }
            showConfirm({
                title: '确定要手动订正当前明细中尚未成功的差异数据？',
                icon: 'warning',
                size: 'large',
                position: 'center',
                confirmType: 'primary',
                onConfirm: function () {
                    manualReviseSubmitting = true;
                    var confirmBtn = getDiffDetailConfirmBtn();
                    if (confirmBtn) {
                        confirmBtn.disabled = true;
                    }
                    doPoster('/validate-sync/manualRevise', {id: currentDetailId}, function (res) {
                        manualReviseSubmitting = false;
                        if (confirmBtn) {
                            confirmBtn.disabled = false;
                        }
                        if (!res.success) {
                            bootGrowl(res.message || '手动订正失败', 'danger');
                            return;
                        }
                        bootGrowl('手动订正完成', 'success');
                        renderDiffDetailModal(res.data || {});
                        resultPagination.doSearch(buildSearchParams());
                    });
                }
            });
        }

        function renderDiffDetailModal(row) {
            var content = parseContent(row.content);
            if (!content) {
                bootGrowl('无差异数据！', 'warning');
                return;
            }
            var type = row.type || '';
            var data = content.data || [];
            var tableNameOuter = row.sourceTableName || (content.tableName || '-');
            var src = row.sourceTotal != null ? row.sourceTotal : (content.sourceTotal != null ? content.sourceTotal : 0);
            var tgt = row.targetTotal != null ? row.targetTotal : (content.targetTotal != null ? content.targetTotal : 0);
            var counts = resolveDiffFixedCounts(row, content);
            var pending = counts.diff > counts.fixed;

            closeDiffDetailModal();
            currentDetailId = row.id || '';

            diffModalInstance = showConfirm({
                title: '差异详情',
                titleExtra: type === 'rowData' ? buildDiffSummaryTitleExtra(src, tgt, counts) : '',
                icon: 'info',
                size: 'max',
                position: 'center',
                body: buildDiffDetailBodyHtml(data, tableNameOuter),
                confirmText: pending ? '手动订正(最多100条)' : '关闭',
                showCancel: pending,
                cancelText: '关闭',
                confirmType: 'primary',
                closeOnConfirm: !pending,
                onConfirm: function () {
                    if (pending) {
                        openManualReviseConfirm();
                        return;
                    }
                    diffModalInstance = null;
                    resetDiffModalActions();
                },
                onCancel: function () {
                    diffModalInstance = null;
                    resetDiffModalActions();
                }
            });
        }

        /**
         * 按明细 ID 拉取完整记录（含 CONTENT）后展示弹窗。
         * @param {string} detailId 明细主键
         */
        window.showDiffDetail = function (detailId) {
            if (!detailId) return;
            doPoster('/validate-sync/getResultDetail', {id: detailId}, function (res) {
                if (!res.success) {
                    bootGrowl(res.message || '加载失败', 'danger');
                    return;
                }
                renderDiffDetailModal(res.data || {});
            });
        };

        $(document).on('click', '.diff-detail-btn', function () {
            var id = $(this).data('detail-id');
            if (id) {
                window.showDiffDetail(String(id));
            }
        });

        // 初始化分页
        var resultPagination = new PaginationManager({
            requestUrl: '/validate-sync/searchResult',
            tableBodySelector: '#detail-result-table',
            params: buildSearchParams(),
            renderRow: function (row, index) {
                var typeCode = row.type || '';
                var badgeClass = typeBadgeMap[typeCode] || 'badge-info';
                var typeText = typeTextMap[typeCode] || typeCode;
                var detailId = row.id != null ? row.id : '';
                return '<tr>' +
                    '<td>' + index + '</td>' +
                    '<td><span class="badge ' + badgeClass + '">' + escapeHtml(typeText) + '</span></td>' +
                    '<td>' + escapeHtml(row.sourceTableName || '-') + '</td>' +
                    '<td>' + escapeHtml(row.targetTableName || '-') + '</td>' +
                    '<td>' + getSourceTargetCounts(row) + '</td>' +
                    '<td>' + getDiffTotal(row) + '</td>' +
                    '<td>' + getCorrectedTotal(row) + '</td>' +
                    '<td>' + formatDate(row.updateTime || '') + '</td>' +
                    '<td><button type="button" class="table-action-btn view diff-detail-btn" title="查看详情" data-detail-id="' + String(detailId).replace(/"/g, '') + '"><i class="fa fa-eye"></i></button></td>' +
                    '</tr>';
            },
            emptyHtml: '<td colspan="9" class="text-center"><i class="fa fa-file-text-o empty-icon"></i><p class="empty-text">暂无校验结果</p><p class="empty-description">请先执行校验任务</p></td>',
            customPageSize: true
        });
    });
</script>
</html>
