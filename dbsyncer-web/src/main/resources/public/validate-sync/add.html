<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">添加订正校验</h3>
    </div>

    <div class="card-body">
        <div class="form-actions mb-4">
            <button id="validate-sync-submit-btn" type="button" class="btn btn-primary">
                <i class="fa fa-save"></i>
                保存
            </button>
            <button class="btn btn-outline" onclick="backIndexPage()">
                <i class="fa fa-reply"></i> 返回
            </button>
        </div>

        <form id="validate-sync-add-form">
            <!-- 创建任务方式选择 -->
            <div class="grid grid-cols-4">
                <div id="task-create" class="radio-group">
                    <input type="radio" name="createType" value="link" checked />
                    <label>关联同步任务</label>
                    <input type="radio" name="createType" value="custom" />
                    <label>自定义</label>
                </div>
            </div>

            <div class="grid grid-cols-2 mt-5">
                <div class="form-item">
                    <label class="form-label">名称<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <input class="form-control" name="name" type="text" maxlength="50" required placeholder="请输入任务名称"/>
                    </div>
                </div>
            </div>

            <!-- 自定义配置 -->
            <div id="custom-config" class="hidden mt-4">
                <!-- 数据源和目标源 -->
                <div class="grid grid-cols-2">
                    <!-- 数据源 -->
                    <div class="form-item">
                        <label class="form-label">
                            <i class="fa fa-database text-primary"></i> 数据源<strong class="text-primary">*</strong>
                        </label>
                        <select name="sourceConnectorId" id="sourceConnectorId" class="form-control">
                            <option th:each="c,s:${connectors}" th:value="${c?.id}" th:text="${c?.name + '(' + c?.config?.connectorType + ')'}" />
                        </select>
                    </div>

                    <!-- 目标源 -->
                    <div class="form-item">
                        <label class="form-label">
                            <i class="fa fa-database text-success"></i> 目标源<strong class="text-primary">*</strong>
                        </label>
                        <select name="targetConnectorId" id="targetConnectorId" class="form-control">
                            <option th:each="c,s:${connectors}" th:value="${c?.id}" th:text="${c?.name + '(' + c?.config?.connectorType + ')'}" />
                        </select>
                    </div>
                </div>

                <!-- 数据库配置 -->
                <div class="grid grid-cols-2 mt-5">
                    <div class="form-item">
                        <label class="form-label">源库</label>
                        <select name="sourceDatabase" id="sourceDatabase" class="form-control"></select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">目标库</label>
                        <select name="targetDatabase" id="targetDatabase" class="form-control"></select>
                    </div>
                </div>

                <!-- Schema配置 -->
                <div class="grid grid-cols-2 mt-5">
                    <div class="form-item">
                        <label class="form-label">源Schema</label>
                        <select name="sourceSchema" id="sourceSchema" class="form-control"></select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">目标Schema</label>
                        <select name="targetSchema" id="targetSchema" class="form-control"></select>
                    </div>
                </div>

                <!-- 驱动名称和匹配相似表 -->
                <div class="grid grid-cols-2 mt-5">
                    <div class="form-item">
                        <label class="form-label"><i class="fa fa-table text-info"></i> 匹配相似表</label>
                        <div class="form-control-area">
                            <label class="form-switch">
                                <input name="autoMatchTable" type="checkbox" />
                                <span class="switch-track">
                                    <span class="switch-option switch-option-on">Yes</span>
                                    <span class="switch-option switch-option-off">No</span>
                                    <span class="switch-thumb"></span>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 表映射关系 -->
                <div class="grid mt-5">
                    <div class="form-item" id="tableGroups">
                        <label class="form-label">
                            表映射关系
                            <i class="fa fa-question-circle" title="适用于快速配置大量表映射关系场景"></i>
                        </label>
                        <div>
                            <textarea name="tableGroups" class="form-control" rows="10" placeholder="请输入表映射关系，每行一个映射..."></textarea>
                            <label class="text-gray-500">
                                <span class="text-sm">数据源表|目标源表=源表字段A1*|目标字段A2*,源表字段B1|目标字段B2</span>
                                <i class="fa fa-question-circle" title="'|'表示映射关系，'='表示后面是表字段映射关系，有多个字段使用英文','拼接，'*'表示主键，如有多张表换行追加"></i>
                                <a class="text-sm" href="https://gitee.com/ghi/dbsyncer/wikis/%E6%93%8D%E4%BD%9C%E6%89%8B%E5%86%8C/%E6%89%B9%E9%87%8F%E9%85%8D%E7%BD%AE%E8%A1%A8%E6%98%A0%E5%B0%84%E5%85%B3%E7%B3%BB"
                                   title="操作手册>批量配置表映射关系" target='_blank'>
                                    <i class="fa fa-external-link"></i>参考文档
                                </a>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 关联配置 -->
            <div id="linked-config" class="hidden mt-4">
                <div class="grid grid-cols-2 mt-5">
                    <div class="form-item">
                        <label class="form-label">同步任务<strong class="text-primary">*</strong></label>
                        <select name="mappingId" id="mappingTask" class="form-control">
                        </select>
                    </div>
                </div>
            </div>

        </form>
    </div>
    <div class="blank-block"></div>
</div>

<script>
    function onDBChange(connectorId, schemaSelect, dbName) {
        doGetter('/connector/getSchema', {id: connectorId, database: dbName}, function (response) {
            if (response.success && response.data) {
                let array = [];
                const schemas = response.data;
                if (schemas && schemas.length > 0) {
                    schemas.forEach(function (schema) {
                        array.push({label: schema, value: schema, disabled: false})
                    });
                }
                schemaSelect.setData(array);
            } else {
                bootGrowl("获取Schema信息失败: " + response.message, "danger");
            }
        })
    }

    function onConnectorChange(connectorId, dbSelect) {
        doGetter('/connector/getDatabase', {id: connectorId}, function (response) {
            if (response.success && response.data) {
                const databases = response.data;
                let db = [];
                if (databases && databases.length > 0) {
                    databases.forEach(function (dbName) {
                        db.push({label: dbName, value: dbName, disabled: false})
                    });
                }
                dbSelect.setData(db);
            } else {
                bootGrowl("获取数据库信息失败: " + response.message, "danger");
            }
        })
    }

    function initDBSelect($connector, $database, $schema) {
        // 为每个 select 组维护独立的连接器ID，避免上下文串用
        let currentConnectorId = null;

        const schemaSelect = $schema.dbSelect({});
        let connectorSelect = $connector.dbSelect({
            type: 'single',
            onSelect: function (connectorId) {
                // 更新当前组的连接器ID
                currentConnectorId = connectorId[0];
                onConnectorChange(currentConnectorId, dbSelect);
            }
        });
        const dbSelect = $database.dbSelect({
            type: 'single',
            onSelect: function (selected) {
                if (currentConnectorId) {
                    onDBChange(currentConnectorId, schemaSelect, selected.length >= 1 ? selected[0] : '');
                }
            }
        });

        // 初始化：如果有默认选中的连接器，设置初始值
        let selected = connectorSelect.getValues();
        if (selected.length >= 1) {
            currentConnectorId = selected[0];
            onConnectorChange(currentConnectorId, dbSelect);
        }
    }

    /**
     * 切换「关联同步任务 / 自定义」时展示对应表单区域。
     */
    function showCreateType(model) {
        const custom = $("#custom-config");
        const linked = $("#linked-config");
        const mappingDbSelect = $("#mappingTask").data("dbSelect");
        if ('custom' === model) {
            custom.removeClass("hidden");
            linked.addClass("hidden");
            if (mappingDbSelect) {
                mappingDbSelect.clear();
            }
        } else {
            linked.removeClass("hidden");
            custom.addClass("hidden");
        }
    }

    // 绑定自定义+关联同步任务切换事件
    function bindCreateTypeChange() {
        const createType = $('#task-create').radioGroup({
            theme: 'info',
            size: 'md',
            onChange: function (value, label) {
                showCreateType(value);
            }
        });
        // 渲染选择radio配置
        showCreateType(createType.getValue());
    }

    /**
     * 加载同步任务下拉数据,（需用户显式选择）。
     */
    function initMappingSelect() {
        let taskSelect = $("#mappingTask").dbSelect({
            type: 'single',
            onSelect: function (selected) {

            }
        });
        doPoster('/mapping/search', {"pageSize": 1000}, function (response) {
            if (response.success && response.data) {
                const data = response.data;
                let array = [];
                if (data) {
                    const mappings = data.data;
                    if (mappings.length > 0) {
                        mappings.forEach(function (mapping) {
                            array.push({label: mapping.name, value: mapping.id, disabled: false})
                        });
                    }
                }
                taskSelect.setData(array);
                // setData 会默认选中第一个非空 value，此处强制保持「未选择真实任务」状态
                taskSelect.clear();
            } else {
                bootGrowl("获取同步任务失败: " + response.message, "danger");
            }
        })
    }

    /**
     * 关联同步任务模式下是否已选择具体任务（排除空占位）。
     * @returns {boolean}
     */
    function hasMappingTaskSelected() {
        const api = $("#mappingTask").data("dbSelect");
        if (api && api.getValues().length > 0) {
            const v = api.getValues()[0];
            return !!(v && String(v).trim());
        }
        const v = $.trim($("#mappingTask").val() || "");
        return v.length > 0;
    }

    $(document).ready(function() {
        initDBSelect($('#sourceConnectorId'), $('#sourceDatabase'), $('#sourceSchema'));
        initDBSelect($('#targetConnectorId'), $('#targetDatabase'), $('#targetSchema'));

        bindCreateTypeChange();
        initMappingSelect();

        //保存
        $("#validate-sync-submit-btn").click(function () {
            const $form = $("#validate-sync-add-form");
            const createType = $form.find('input[name="createType"]:checked').val();
            if (createType === 'link' && !hasMappingTaskSelected()) {
                bootGrowl("请选择同步任务", "warning");
                return;
            }
            if (validateForm($form)) {
                const btn = $(this);
                const originalText = btn.html();
                btn.html('<i class="fa fa-spinner fa-spin"></i> 保存中...').prop('disabled', true);
                /** @type {Record<string, string|string[]>} */
                let payload = $form.serializeJson();
                if (createType === 'custom') {
                    payload.mappingId = "";
                }
                doPoster("/validate-sync/add", payload, function (response) {
                    btn.html(originalText).prop('disabled', false);
                    if (response.success === true) {
                        bootGrowl("保存订正校验成功!", "success");
                        backIndexPage();
                    } else {
                        bootGrowl(response.message, "danger");
                    }
                });
            }
        });
    })
</script>
</html>
