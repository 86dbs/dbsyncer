<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content" id="validate_sync_advanced_setting">
    <div class="grid grid-cols-3">
        <div class="form-item">
            <label class="form-label">
                批量读取 <strong class="text-primary">*</strong>
            </label>
            <div class="form-control-area">
                <input type="number" name="readNum" class="form-control" min="1" max="200000" required
                       placeholder="1-200000"
                       th:value="${task != null and task.readNum > 0 ? task.readNum : 10000}" />
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">
                单次写入 <strong class="text-primary">*</strong>
            </label>
            <div class="form-control-area">
                <input type="number" name="batchNum" class="form-control" min="1" max="20000" required
                       placeholder="1-20000"
                       th:value="${task != null and task.batchNum > 0 ? task.batchNum : 1000}" />
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">
                单表线程数 <strong class="text-primary">*</strong>
            </label>
            <div class="form-control-area">
                <input type="number" name="threadNum" class="form-control" min="1" max="64" required
                       placeholder="1-64"
                       th:value="${task != null and task.threadNum > 0 ? task.threadNum : 10}" />
            </div>
        </div>
    </div>
</div>
</html>
