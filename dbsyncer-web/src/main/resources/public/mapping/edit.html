<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <form id="mappingModifyForm" method="post">
    <div class="card-header">
        <div class="grid grid-cols-6 items-center">
            <div class="lg:col-span-2"></div>
            <div class="lg:col-span-2 card-title text-center">
                <span id="mapping_name_modify" class="text-xxl">[[${mapping?.name}]]</span>
                <i class="fa fa-edit text-info text-xl cursor-pointer" th:title="点击修改名称" th:onclick="mappingModifyName()"></i>
                <p class="card-subtitle">[[${mapping?.id}]]</p>
                <!-- 隐藏表单值 -->
                <div class="hidden">
                    <input id="mappingId" name="id" type="text" th:value="${mapping?.id}"/>
                    <input name="name" type="text" th:value="${mapping?.name}"/>
                </div>
            </div>
            <div class="lg:col-span-2"></div>
        </div>
    </div>
    <div class="card-body">
        <!-- 驱动同步关系 -->
        <div class="grid grid-cols-9">
            <div class="flex items-center lg:col-span-4">
                <img draggable="false" style="width: 60px; height: 60px;" th:src="@{'/img/'+ ${mapping?.sourceConnector?.config?.connectorType} + '.png'}" />
                <div class="w-full">
                    <!-- 数据源 -->
                    <div class="form-item mb-4">
                        <label class="form-label">
                            <i class="fa fa-database text-primary"></i> 数据源<strong class="text-primary">*</strong>
                        </label>
                        <select name="sourceConnectorId" id="sourceConnectorId" class="form-control">
                            <option th:each="c,s:${connectors}"
                                    th:value="${c?.id}"
                                    th:disabled="${c?.config?.connectorType != mapping?.sourceConnector?.config?.connectorType}"
                                    th:selected="${c?.id eq mapping?.sourceConnectorId}"
                                    th:text="${c?.name + '(' + c?.config?.connectorType + (c?.config?.connectorType != mapping?.sourceConnector?.config?.connectorType ? '与源类型不一致' : '') + ')'}" />
                        </select>
                    </div>
                    <div class="form-item mb-4">
                        <label class="form-label">源Schema</label>
                        <select name="sourceSchema" id="sourceSchema" class="form-control" th:data-schema="${mapping?.sourceSchema}"></select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">源库</label>
                        <select name="sourceDatabase" id="sourceDatabase" class="form-control" th:data-database="${mapping?.sourceDatabase}"></select>
                    </div>
                </div>
            </div>
            <div class="text-info text-center">
                <i class="fa fa-arrow-right fa-3x"></i>
            </div>
            <div class="flex items-center lg:col-span-4">
                <img draggable="false" style="width: 60px; height: 60px;" th:src="@{'/img/'+ ${mapping?.targetConnector?.config?.connectorType} + '.png'}" />
                <div class="w-full">
                    <!-- 目标源 -->
                    <div class="form-item mb-4">
                        <label class="form-label">
                            <i class="fa fa-database text-success"></i> 目标源<strong class="text-primary">*</strong>
                        </label>
                        <select name="targetConnectorId" id="targetConnectorId" class="form-control">
                            <option th:each="c,s:${connectors}" th:value="${c?.id}"
                                    th:disabled="${c?.config?.connectorType != mapping?.targetConnector?.config?.connectorType}"
                                    th:selected="${c?.id eq mapping?.targetConnectorId}"
                                    th:text="${c?.name + '(' + c?.config?.connectorType + (c?.config?.connectorType != mapping?.targetConnector?.config?.connectorType ? '与目标类型不一致' : '') + ')'}" />
                        </select>
                    </div>
                    <div class="form-item mb-4">
                        <label class="form-label">目标Schema</label>
                        <select name="targetSchema" id="targetSchema" class="form-control" th:data-schema="${mapping?.targetSchema}"></select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">目标库</label>
                        <select name="targetDatabase" id="targetDatabase" class="form-control" th:data-database="${mapping?.targetDatabase}"></select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 同步模式选择 -->
        <div class="flex items-center justify-between mt-4">
            <div id="mapping_model" class="radio-group">
                <input type="radio" name="model" value="full" th:checked="${'full' eq mapping?.model}" />
                <label>全量</label>
                <input type="radio" name="model" value="increment" th:checked="${'increment' eq mapping?.model}" />
                <label>增量</label>
<!--                <input type="radio" name="model" value="fullToIncrement" disabled />-->
<!--                <label>全量+增量</label>-->
            </div>

            <div class="form-actions">
                <span th:if="${mapping?.meta?.state ne 0}">
                    <button type="button" class="btn btn-info" disabled>
                        <i class="fa fa-save"></i> 运行中
                    </button>
                </span>
                <button th:if="${mapping?.meta?.state eq 0}" 
                        id="mappingSubmitBtn" 
                        type="button" 
                        class="btn btn-primary">
                    <i class="fa fa-save"></i> 保存
                </button>
                <button type="button" class="btn btn-outline" onclick="backIndexPage()">
                    <i class="fa fa-reply"></i> 返回
                </button>
            </div>
        </div>

        <!-- 映射关系区域 -->
        <h3><i class="fa fa-table text-success"></i> 映射关系</h3>
        <div th:replace="mapping/editTable :: content"></div>

        <!-- 高级配置区域 -->
        <h3><i class="fa fa-table text-info"></i> 高级配置</h3>
        <p class="text-xs text-tertiary">对所有表映射关系都生效</p>
        <!-- 全量配置 -->
        <div th:replace="mapping/editFull :: content"></div>

        <!-- 增量配置 -->
        <div th:replace="mapping/editIncrement :: content"></div>

        <!-- 策略配置 -->
        <div th:replace="mapping/editStrategy :: content"></div>

        <!-- 过滤条件 -->
        <div th:replace="mapping/editFilter :: content"></div>

        <!-- 转换配置 -->
        <div th:replace="mapping/editConvert :: content"></div>

        <!-- 插件配置 -->
        <div th:replace="mapping/editPlugin :: content"></div>

        <div class="blank-block-md"></div>
    </div>
    </form>
</div>

<script th:src="@{/js/mapping/edit.js}"></script>
</html>
