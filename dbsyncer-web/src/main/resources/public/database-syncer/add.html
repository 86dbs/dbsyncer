<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container database-syncer-page">
    <div class="card-body p-0">
        <form id="database-syncer-form">
            <!-- 顶部配置区：任务名 + 操作 + 源端与迁移策略 -->
            <div class="ds-page-header">
                <div class="ds-task-title-row">
                    <div class="form-item ds-task-name-item mb-0">
                        <label class="form-label">任务名称<strong class="text-primary">*</strong></label>
                        <div class="form-control-area">
                            <input class="form-control form-control-50" name="name" type="text" maxlength="50" required
                                   placeholder="请输入任务名称"/>
                        </div>
                    </div>
                    <div class="ds-page-actions">
                        <button id="database-syncer-submit-btn" type="button" class="btn btn-primary">
                            <i class="fa fa-save"></i> 保存
                        </button>
                        <button class="btn btn-outline" type="button" onclick="backIndexPage()">
                            <i class="fa fa-reply"></i> 返回
                        </button>
                    </div>
                </div>
                <div class="ds-config-bar dbsyncer-select-panel">
                    <div class="ds-bar-item">
                        <span class="ds-bar-label text-primary">源端</span>
                        <select id="sourceConnectorId" class="form-control">
                            <option value="">请选择连接器</option>
                            <option th:each="c : ${connectors}" th:value="${c?.id}"
                                    th:attr="data-connector-type=${c?.config?.connectorType}"
                                    th:text="${c?.name + '(' + c?.config?.connectorType + ')'}"></option>
                        </select>
                    </div>
                    <div th:replace="database-syncer/syncStrategy :: bar"></div>
                </div>
            </div>

            <!-- 主从工作区：左侧库映射 + 右侧表映射详情 -->
            <div class="mapping-workspace mapping-workspace--page">
                <aside class="mapping-sidebar">
                    <div class="mapping-sidebar-header">
                        库映射关系 (<span id="mappingCount">0</span>)
                    </div>
                    <button type="button" id="btnAddDbMapping" class="btn btn-primary w-full mb-3">
                        <i class="fa fa-plus"></i> 添加库映射关系
                    </button>
                    <div id="mappingCardList" class="mapping-card-list"></div>
                    <div id="mappingSidebarEmpty" class="mapping-sidebar-empty hidden">
                        <i class="fa fa-database empty-icon"></i>
                        <p class="empty-text mt-2">暂无库映射</p>
                        <p class="empty-description text-sm">选择源端连接器后，点击「添加库映射关系」选择表</p>
                    </div>
                </aside>

                <section class="mapping-detail">

                    <div id="mappingDetailPanel" class="mapping-detail-panel hidden">
                        <div class="ds-target-config-panel dbsyncer-select-panel">
                            <div class="ds-target-config-fields">
                                <div class="form-item ds-target-field mb-0">
                                    <label class="form-label">目标连接<strong class="text-primary">*</strong></label>
                                    <div class="form-control-area">
                                        <select id="targetConnectorId" class="form-control">
                                            <option value="">请选择连接器</option>
                                            <option th:each="c : ${connectors}" th:value="${c?.id}"
                                                    th:attr="data-connector-type=${c?.config?.connectorType}"
                                                    th:text="${c?.name + '(' + c?.config?.connectorType + ')'}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-item ds-target-field mb-0">
                                    <label class="form-label">目标库名<strong class="text-primary">*</strong></label>
                                    <div class="form-control-area">
                                        <input type="text" id="detailTargetDatabase" class="form-control"
                                               maxlength="128" placeholder="目标库名"/>
                                    </div>
                                </div>
                                <div class="form-item ds-target-field mb-0" id="detailTargetSchemaWrap">
                                    <label class="form-label">目标 Schema</label>
                                    <div class="form-control-area">
                                        <input type="text" id="detailTargetSchema" class="form-control" maxlength="128"
                                               placeholder="目标 Schema"/>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mapping-detail-header mapping-detail-header--toolbar">
                            <span class="mapping-detail-title" id="mappingDetailTitle">
                                <i class="fa fa-table"></i> 表映射明细
                            </span>
                            <button type="button" id="btnBatchTablePrefix" class="btn btn-outline btn-sm">
                                批量加目标表前缀
                            </button>
                        </div>
                        <div class="mapping-detail-scroll">
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th style="width: 56px;">序号</th>
                                    <th>源表名</th>
                                    <th>目标表名 <i class="fa fa-pencil text-tertiary"></i></th>
                                    <th style="width: 120px;">操作</th>
                                </tr>
                                </thead>
                                <tbody id="mappingDetailTableBody"></tbody>
                            </table>
                        </div>
                        <div id="mappingDetailPagination" class="mapping-detail-pagination hidden">
                            <p class="text-sm text-tertiary pagination-info mb-0">
                                共 <span class="mappingDetailTotalCount">0</span> 条，第
                                <span class="mappingDetailCurrentPage">1</span> /
                                <span class="mappingDetailTotalPages">1</span> 页
                            </p>
                            <div class="pagination-bar flex items-center"></div>
                        </div>
                    </div>
                </section>
            </div>

            <input type="hidden" name="databaseMappingsJson" id="databaseMappingsJson" value="[]"/>
        </form>
    </div>
    <div class="blank-block"></div>
</div>

<!-- 选择源库表弹窗 -->
<div id="tablePickerModal" class="picker-modal hidden">
    <div class="picker-modal-backdrop" id="tablePickerModalBackdrop"></div>
    <div class="picker-modal-dialog dbsyncer-select-panel picker-modal-dialog--wide">
        <div class="picker-modal-header">
            <h4 class="picker-modal-title">选择源库与目标表映射</h4>
            <button type="button" class="picker-modal-close" id="btnCloseTablePicker" aria-label="关闭">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <div class="picker-modal-body">
            <div class="picker-modal-section">
                <div class="picker-modal-section-title">1. 选择源库</div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="form-item-stack">
                        <label class="form-label">库</label>
                        <select id="sourceDatabase" class="form-control"></select>
                    </div>
                    <div class="form-item-stack">
                        <label class="form-label">Schema</label>
                        <select id="sourceSchema" class="form-control"></select>
                    </div>
                </div>
            </div>

            <div class="picker-modal-section">
                <div class="picker-modal-section-title">2. 指定目标库</div>
                <div class="picker-modal-target-box">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-item-stack">
                            <label class="form-label text-sm">目标连接<strong class="text-primary">*</strong></label>
                            <select id="pickerTargetConnectorId" class="form-control">
                                <option value="">请选择连接器</option>
                                <option th:each="c : ${connectors}" th:value="${c?.id}"
                                        th:attr="data-connector-type=${c?.config?.connectorType}"
                                        th:text="${c?.name + '(' + c?.config?.connectorType + ')'}"></option>
                            </select>
                        </div>
                        <div class="form-item-stack">
                            <label class="form-label text-sm">目标库名</label>
                            <input type="text" id="pickerTargetDatabase" class="form-control" maxlength="128"
                                   placeholder="目标库名"/>
                        </div>
                        <div class="form-item-stack" id="pickerTargetSchemaWrap">
                            <label class="form-label text-sm">目标 Schema</label>
                            <input type="text" id="pickerTargetSchema" class="form-control" maxlength="128"
                                   placeholder="目标 Schema"/>
                        </div>
                    </div>
                </div>
            </div>

            <div class="picker-modal-section">
                <div class="picker-modal-section-title">3. 勾选需要同步的物理表</div>
                <div class="flex items-center justify-between gap-2 mb-2">
                    <div class="search-wrapper flex-1">
                        <i class="fa fa-search search-icon"></i>
                        <input id="sourceTableSearch" class="search-input" type="text" maxlength="64"
                               placeholder="输入表名过滤搜索...">
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button type="button" id="btnClearAllTables" class="btn btn-outline btn-sm">清空</button>
                    </div>
                </div>
                <div id="sourceTableTree" class="picker-scroll picker-tree-checkbox-group"></div>
            </div>
        </div>
        <div class="picker-modal-footer">
            <button type="button" id="btnCancelTablePicker" class="btn btn-outline">取消</button>
            <button type="button" id="btnConfirmTablePicker" class="btn btn-primary">
                <i class="fa fa-check"></i> 确认添加
            </button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.DATABASE_SYNC_PAGE = {
        mode: 'add',
        readOnly: false,
        task: null
    };
</script>
<script th:src="@{/js/database-syncer/database-syncer.js}"></script>
</html>
