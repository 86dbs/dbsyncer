<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">添加整库迁移</h3>
    </div>

    <div class="card-body">
        <div class="form-actions mb-4">
            <button id="database-syncer-submit-btn" type="button" class="btn btn-primary">
                <i class="fa fa-save"></i> 保存
            </button>
            <button class="btn btn-outline" type="button" onclick="backIndexPage()">
                <i class="fa fa-reply"></i> 返回
            </button>
        </div>

        <form id="database-syncer-add-form">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="form-item">
                    <label class="form-label">任务名称<strong class="text-primary">*</strong></label>
                    <div class="form-control-area">
                        <input class="form-control" name="name" type="text" maxlength="50" required placeholder="请输入任务名称"/>
                    </div>
                </div>
            </div>

            <!-- 源端 / 目标端连接器 -->
            <div class="ds-bar dbsyncer-select-panel">
                <div class="ds-bar-item">
                    <span class="ds-bar-label text-primary">源端</span>
                    <select name="sourceConnectorId" id="sourceConnectorId" class="form-control">
                        <option value="">请选择连接器</option>
                        <option th:each="c : ${connectors}" th:value="${c?.id}"
                                th:text="${c?.name + '(' + c?.config?.connectorType + ')'}"></option>
                    </select>
                </div>
                <div class="ds-bar-arrow">
                    <i class="fa fa-long-arrow-right text-tertiary"></i>
                </div>
                <div class="ds-bar-item">
                    <span class="ds-bar-label text-success">目标端</span>
                    <select name="targetConnectorId" id="targetConnectorId" class="form-control">
                        <option value="">请选择连接器</option>
                        <option th:each="c : ${connectors}" th:value="${c?.id}"
                                th:text="${c?.name + '(' + c?.config?.connectorType + ')'}"></option>
                    </select>
                </div>
            </div>

            <!-- 主从布局：左侧库映射列表 + 右侧表映射详情 -->
            <div class="mapping-workspace mt-4">
                <aside class="mapping-sidebar">
                    <button type="button" id="btnAddDbMapping" class="btn btn-info w-full mb-3">
                        <i class="fa fa-plus"></i> 添加库映射
                    </button>
                    <div id="mappingCardList" class="mapping-card-list"></div>
                    <div id="mappingSidebarEmpty" class="mapping-sidebar-empty">
                        <i class="fa fa-database empty-icon"></i>
                        <p class="empty-text mt-2">暂无库映射</p>
                        <p class="empty-description text-sm">选择源/目标连接器后，点击「添加库映射」选择表</p>
                    </div>
                </aside>

                <section class="mapping-detail">
                    <div id="mappingDetailPanel" class="mapping-detail-panel hidden">
                        <div class="mapping-detail-header">
                            <span class="mapping-detail-title"><i class="fa fa-table"></i> Tables <span id="mappingDetailTableCount" class="text-tertiary">0</span></span>
                        </div>
                        <div class="mapping-detail-scroll">
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th>源表名</th>
                                    <th>目标表名 <i class="fa fa-pencil text-tertiary"></i></th>
                                    <th style="width: 120px;">操作</th>
                                </tr>
                                </thead>
                                <tbody id="mappingDetailTableBody"></tbody>
                            </table>
                        </div>
                        <div id="mappingDetailPagination" class="mapping-detail-pagination">
                            <p class="text-sm text-tertiary pagination-info mb-0">
                                共 <span class="mappingDetailTotalCount">0</span> 条，第
                                <span class="mappingDetailCurrentPage">1</span> /
                                <span class="mappingDetailTotalPages">1</span> 页
                            </p>
                            <div class="pagination-bar flex items-center"></div>
                        </div>
                    </div>
                </section>
            </div>

            <input type="hidden" name="databaseMappingsJson" id="databaseMappingsJson" value="[]"/>
        </form>
    </div>
    <div class="blank-block"></div>
</div>

<!-- 选择源库表弹窗 -->
<div id="tablePickerModal" class="picker-modal hidden">
    <div class="picker-modal-backdrop" id="tablePickerModalBackdrop"></div>
    <div class="picker-modal-dialog dbsyncer-select-panel">
        <div class="picker-modal-header">
            <h4 class="picker-modal-title">选择源库与表</h4>
            <button type="button" class="picker-modal-close" id="btnCloseTablePicker" aria-label="关闭">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <div class="picker-modal-body">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div class="form-item-stack">
                    <label class="form-label">库</label>
                    <select id="sourceDatabase" class="form-control"></select>
                </div>
                <div class="form-item-stack">
                    <label class="form-label">Schema</label>
                    <select id="sourceSchema" class="form-control"></select>
                </div>
            </div>
            <div class="flex items-center justify-between gap-2 mb-2">
                <div class="search-wrapper flex-1">
                    <i class="fa fa-search search-icon"></i>
                    <input id="sourceTableSearch" class="search-input" type="text" maxlength="64" placeholder="搜索表名">
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <button type="button" id="btnSelectAllTables" class="btn btn-outline btn-sm">全选</button>
                    <button type="button" id="btnClearAllTables" class="btn btn-outline btn-sm">清空</button>
                </div>
            </div>
            <div id="sourceTableTree" class="picker-scroll"></div>
        </div>
        <div class="picker-modal-footer">
            <button type="button" id="btnConfirmTablePicker" class="btn btn-primary">
                <i class="fa fa-check"></i> 确认添加
            </button>
            <button type="button" id="btnCancelTablePicker" class="btn btn-outline">取消</button>
        </div>
    </div>
</div>

<script th:src="@{/js/database-syncer/database-syncer.js}"></script>
</html>
