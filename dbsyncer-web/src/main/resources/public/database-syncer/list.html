<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">整库迁移</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-center">
            <div id="database-syncer-search" class="lg:col-span-2 search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input class="search-input" type="text" maxlength="32" placeholder="搜索任务名称">
                <span class="search-clear" title="清除">
                    <i class="fa fa-times"></i>
                </span>
            </div>
            <div class="lg:col-span-2"></div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button class="btn btn-primary" onclick="doLoader('/database-syncer/pageAdd')">
                    <i class="fa fa-plus"></i> 添加
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th></th>
                <th>任务名称</th>
                <th>库映射数</th>
                <th>结果</th>
                <th>状态</th>
                <th>更新时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="database-syncer-table"></tbody>
        </table>
        <div class="blank-block"></div>
    </div>
</div>

<script>
    function databaseSyncStart(taskId) {
        doPoster('/database-syncer/start', { id: taskId }, function (response) {
            if (response.success) {
                bootGrowl(response.data || '启动成功', 'success');
                refreshIndexList();
            } else {
                bootGrowl(response.message || '启动失败', 'danger');
            }
        });
    }

    function databaseSyncStop(taskId) {
        doPoster('/database-syncer/stop', { id: taskId }, function (response) {
            if (response.success) {
                bootGrowl(response.data || '停止成功', 'success');
                refreshIndexList();
            } else {
                bootGrowl(response.message || '停止失败', 'danger');
            }
        });
    }

    function databaseSyncRemove(taskId) {
        if (!confirm('确定删除该任务？')) {
            return;
        }
        doPoster('/database-syncer/remove', { id: taskId }, function (response) {
            if (response.success) {
                bootGrowl(response.data || '删除成功', 'success');
                refreshIndexList();
            } else {
                bootGrowl(response.message || '删除失败', 'danger');
            }
        });
    }

    function getTaskStateConfig(taskId) {
        return {
            0: {
                icon: 'fa-play',
                title: '启动',
                onclick: "databaseSyncStart('" + taskId + "')",
                disabled: false,
                class: 'badge-info',
                text: '未运行'
            },
            1: {
                icon: 'fa-pause',
                title: '停止',
                onclick: "databaseSyncStop('" + taskId + "')",
                disabled: false,
                class: 'badge-success',
                text: '运行中'
            },
            2: {
                icon: 'fa-spinner fa-spin',
                title: '停止中',
                text: '停止中',
                disabled: true,
                class: 'badge-warning'
            }
        };
    }

    function renderTaskStateText(state) {
        const stateConfig = getTaskStateConfig();
        const config = stateConfig[state] || stateConfig[0];
        return '<span class="badge ' + config.class + '">' + config.text + '</span>';
    }

    function renderTaskStateButton(state, taskId) {
        const stateConfig = getTaskStateConfig(taskId);
        const config = stateConfig[state] || stateConfig[0];
        const disabledAttr = config.disabled ? ' disabled' : '';
        const onclickAttr = config.onclick ? ' onclick="' + config.onclick + '"' : '';
        let html = '<button class="table-action-btn play" title="' + config.title + '"' + onclickAttr + disabledAttr + '>'
            + '<i class="fa ' + config.icon + '"></i></button>';
        if (state === 0) {
            html += '<button class="table-action-btn delete" title="删除" onclick="databaseSyncRemove(\'' + taskId + '\')">'
                + '<i class="fa fa-trash"></i></button>';
        }
        return html;
    }



    /**
     * 结果列：进度 + 异常条数（failTotal > 0 的明细数）
     */
    function renderResultColumn(task) {
        var n = Number(task.errorCount);
        if (isNaN(n) || n < 0) {
            n = 0;
        }
        var taskId = String(task.id || '').replace(/'/g, '');
        var isRunning = Number(task.status) === 1;
        var progressRaw = task.progress;
        if (progressRaw === null || progressRaw === undefined || progressRaw === '') {
            if (isRunning) {
                progressRaw = 0;
            } else {
                return '';
            }
        }
        var progress = Number(progressRaw);
        if (isNaN(progress) || progress < 0) {
            progress = 0;
        }
        if (progress > 100) {
            progress = 100;
        }
        if (progress === 0 && !isRunning) {
            return '';
        }

        var state = 'success';
        if (isRunning) {
            if (progress >= 80) {
                state = 'danger';
            } else if (progress >= 60) {
                state = 'warning';
            }
        } else if (n > 0) {
            state = 'danger';
        }

        var left = (n > 0)
            ? ('异常：<a href="javascript:void(0)" class="hover:underline cursor-pointer" title="查看失败迁移结果" '
                + 'onclick="doLoader(\'/database-syncer/page/detail?id=' + taskId + '&detailStatus=fail\'); return false;">'
                + '<span class="badge badge-error">' + n + '</span></a>')
            : '<span class="badge badge-success">正常</span>';
        var rightText = (isRunning && progress === 0) ? '0%' : (progress + '%');
        return ''
            + '<div style="min-width: 160px;">'
            + '  <div class="progress-header" style="margin-bottom: 6px;">'
            + '    <span class="progress-title">' + left + '</span>'
            + '    <span class="progress-value progress-value-' + state + '" style="font-size: 12px; font-weight: 600;">' + rightText + '</span>'
            + '  </div>'
            + '  <div class="progress-bar" style="height: 6px; margin-bottom: 0;">'
            + '    <div class="progress-fill ' + state + '" style="width: ' + progress + '%"></div>'
            + '  </div>'
            + '</div>';
    }

    $(document).ready(function () {
        window.backIndexPage = function () {
            doLoader('/database-syncer/list');
        };

        const pagination = new PaginationManager({
            requestUrl: '/database-syncer/search',
            tableBodySelector: '#database-syncer-table',
            storageKey: 'database-syncer-list',
            renderRow: function (task, index) {
                const mappingCount = task.mappingCount != null ? task.mappingCount : 0;
                const taskId = String(task.id || '').replace(/"/g, '');
                return ''
                    + '<tr>'
                    + '<td>' + index + '</td>'
                    + '<td>'
                    + '<a href="javascript:void(0)" class="text-primary hover:underline cursor-pointer" title="点击查看迁移结果" '
                    + 'onclick="doLoader(\'/database-syncer/page/detail?id=' + taskId + '\')">'
                    + escapeHtml(task.name || '') + '</a>'
                    + '</td>'
                    + '<td>' + mappingCount + '</td>'
                    + '<td>' + renderResultColumn(task) + '</td>'
                    + '<td>' + renderTaskStateText(task.status || 0) + '</td>'
                    + '<td>' + formatDate(task.updateTime || '') + '</td>'
                    + '<td><div class="flex items-center">'
                    + '<button class="table-action-btn view" title="修改" onclick="doLoader(\'/database-syncer/page/edit?id='
                    + taskId + '\')">'
                    + '<i class="fa fa-edit"></i></button>'
                    + renderTaskStateButton(task.status || 0, task.id)
                    + '</div></td>'
                    + '</tr>';
            },
            emptyHtml: '<td colspan="8" class="text-center">'
                + '<i class="fa fa-database empty-icon"></i>'
                + '<p class="empty-text">暂无整库迁移任务</p>'
                + '<p class="empty-description">点击「添加」创建第一个整库迁移任务</p></td>',
            customPageSize: true
        });

        const searchInput = initSearch('database-syncer-search', function (searchKey) {
            pagination.doSearch({ searchKey: searchKey }, 1);
        });

        window.refreshIndexList = function () {
            pagination.doSearch({ searchKey: searchInput.getValue() }, pagination.currentPage);
        };

        PageRefreshManager.register(function () {
            pagination.doSearch({ searchKey: searchInput.getValue() }, pagination.currentPage);
        });
    });
</script>
</html>
