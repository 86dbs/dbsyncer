<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">迁移结果详情</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-center mb-4">
            <div class="lg:col-span-3 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">选择任务</label>
                <select id="detailTaskSelect" class="form-control">
                    <option th:each="t : ${taskList}" th:value="${t.id}" th:text="${t.name}" th:selected="${t.id == taskId}"></option>
                </select>
            </div>
            <div class="lg:col-span-1"></div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button class="btn btn-primary mr-3" id="refreshBtn">
                    <i class="fa fa-refresh"></i> 刷新
                </button>
                <button class="btn btn-outline" onclick="backIndexPage()">
                    <i class="fa fa-reply"></i> 返回列表
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 50px;"></th>
                <th>迁移类型</th>
                <th>源库</th>
                <th>源表</th>
                <th>目标库</th>
                <th>目标表</th>
                <th>源端行数</th>
                <th>成功数</th>
                <th>失败数</th>
                <th>更新时间</th>
                <th style="width: 100px;">查看详情</th>
            </tr>
            </thead>
            <tbody id="detail-result-table"></tbody>
        </table>
        <div class="blank-block"></div>
    </div>
</div>

<div id="migrationDetailOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:var(--z-modal-backdrop, 1040);">
    <div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:8px; width:min(980px, 92vw); max-height:80vh; display:flex; flex-direction:column; z-index:var(--z-modal, 1050);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #eee;">
            <h4 style="margin:0; font-size:16px;">错误详情</h4>
            <button type="button" id="closeMigrationDetailBtn" class="btn btn-outline btn-sm">关闭</button>
        </div>
        <div style="padding:16px; overflow:auto;">
            <pre id="migrationDetailContent" style="margin:0; white-space:pre-wrap; word-break:break-word; background:#f7f7f8; border:1px solid #eee; border-radius:6px; padding:12px;"></pre>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        window.backIndexPage = function () {
            doLoader('/database-syncer/list');
        };

        var currentTaskId = '[[${taskId}]]';

        $('#detailTaskSelect').dbSelect({
            type: 'single',
            onSelect: function (selected) {
                var selectedId = selected.value || selected;
                if (selectedId && selectedId !== currentTaskId) {
                    currentTaskId = selectedId;
                    doLoader('/database-syncer/page/detail?id=' + currentTaskId);
                }
            }
        });

        $('#refreshBtn').click(function () {
            var api = $('#detailTaskSelect').data('dbSelect');
            if (api && api.getValues().length > 0) {
                currentTaskId = api.getValues()[0];
            }
            resultPagination.doSearch({ taskId: currentTaskId });
        });

        var typeTextMap = {
            rowData: '数据迁移',
            tableSchema: '表结构'
        };
        var typeBadgeMap = {
            rowData: 'badge-primary',
            tableSchema: 'badge-info'
        };

        function formatSourceDb(row) {
            var db = row.sourceDatabase || '';
            var schema = row.sourceSchema || '';
            if (db && schema) {
                return escapeHtml(db) + ' / ' + escapeHtml(schema);
            }
            return escapeHtml(db || schema || '-');
        }

        function formatFailTotal(fail) {
            var n = Number(fail) || 0;
            if (n > 0) {
                return '<span class="badge badge-error">' + n + '</span>';
            }
            return '<span class="badge badge-success">0</span>';
        }

        function closeMigrationDetail() {
            $('#migrationDetailOverlay').hide();
            $('#migrationDetailContent').text('');
        }

        window.showMigrationDetail = function (encodedContent) {
            var text = '';
            try {
                text = decodeURIComponent(encodedContent || '');
            } catch (e) {
                text = encodedContent || '';
            }
            $('#migrationDetailContent').text(text || '暂无错误详情');
            $('#migrationDetailOverlay').show();
        };

        $('#closeMigrationDetailBtn').on('click', closeMigrationDetail);
        $('#migrationDetailOverlay').on('click', function (e) {
            if (e.target === this) {
                closeMigrationDetail();
            }
        });

        var resultPagination = new PaginationManager({
            requestUrl: '/database-syncer/searchResult',
            tableBodySelector: '#detail-result-table',
            params: { taskId: currentTaskId },
            pageSize: 10,
            customPageSize: true,
            customPageSizeItems: [5, 10, 20, 50, 100, 200],
            storageKey: 'database-syncer-detail',
            renderRow: function (row, index) {
                var typeCode = row.type || '';
                var badgeClass = typeBadgeMap[typeCode] || 'badge-info';
                var typeText = typeTextMap[typeCode] || typeCode;
                var sourceTotal = row.sourceTotal;
                if (sourceTotal === undefined || sourceTotal === null || sourceTotal === '') {
                    sourceTotal = typeCode === 'rowData' ? '-' : '<span class="text-gray-400">-</span>';
                }
                var encodedContent = encodeURIComponent(row.content || '');
                return '<tr>'
                    + '<td>' + index + '</td>'
                    + '<td><span class="badge ' + badgeClass + '">' + escapeHtml(typeText) + '</span></td>'
                    + '<td>' + formatSourceDb(row) + '</td>'
                    + '<td>' + escapeHtml(row.sourceTable || '-') + '</td>'
                    + '<td>' + escapeHtml(row.targetDatabase || '-') + '</td>'
                    + '<td>' + escapeHtml(row.targetTable || '-') + '</td>'
                    + '<td>' + sourceTotal + '</td>'
                    + '<td>' + (row.successTotal != null ? row.successTotal : '-') + '</td>'
                    + '<td>' + formatFailTotal(row.failTotal) + '</td>'
                    + '<td>' + formatDate(row.updateTime || '') + '</td>'
                    + '<td><button type="button" class="table-action-btn view diff-detail-btn" title="查看详情"  onclick="showMigrationDetail(\'' + encodedContent + '\')"><i class="fa fa-eye"></i></button></td>'
                    + '</tr>';
            },
            emptyHtml: '<td colspan="11" class="text-center"><i class="fa fa-database empty-icon"></i>'
                + '<p class="empty-text">暂无迁移结果</p>'
                + '<p class="empty-description">任务执行完成后将在此展示各表迁移明细</p></td>'
        });
    });
</script>
</html>
