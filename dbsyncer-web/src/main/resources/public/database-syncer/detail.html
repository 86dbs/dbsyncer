<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">迁移结果详情</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-center mb-4">
            <div class="lg:col-span-2 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">选择任务</label>
                <select id="detailTaskSelect" class="form-control">
                    <option th:each="t : ${taskList}" th:value="${t.id}" th:text="${t.name}" th:selected="${t.id == taskId}"></option>
                </select>
            </div>
            <div class="lg:col-span-2 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">迁移类型</label>
                <select id="detailTypeFilter" class="form-control">
                    <option value="" th:selected="${detailType == null or detailType == ''}">全部</option>
                    <option value="rowData" th:selected="${detailType == 'rowData'}">数据迁移</option>
                    <option value="tableSchema" th:selected="${detailType == 'tableSchema'}">表结构</option>
                </select>
            </div>
            <div class="lg:col-span-2 flex items-center">
                <label class="form-label mr-3" style="white-space: nowrap;">状态</label>
                <select id="detailStatusFilter" class="form-control">
                    <option value="" th:selected="${detailStatus == null or detailStatus == ''}">全部</option>
                    <option value="success" th:selected="${detailStatus == 'success'}">成功</option>
                    <option value="fail" th:selected="${detailStatus == 'fail'}">失败</option>
                </select>
            </div>
        </div>
        <div class="grid grid-cols-6 items-center mb-4">
            <div class="lg:col-span-4"></div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button class="btn btn-primary mr-3" id="refreshBtn">
                    <i class="fa fa-refresh"></i> 刷新
                </button>
                <button class="btn btn-outline" onclick="backIndexPage()">
                    <i class="fa fa-reply"></i> 返回列表
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 50px;"></th>
                <th>迁移类型</th>
                <th>源库</th>
                <th>源表</th>
                <th>目标库</th>
                <th>目标表</th>
                <th>源端行数</th>
                <th>成功数</th>
                <th>失败数</th>
                <th>更新时间</th>
                <th style="width: 100px;">查看详情</th>
            </tr>
            </thead>
            <tbody id="detail-result-table"></tbody>
        </table>
        <div class="blank-block"></div>
    </div>
</div>

<div id="migrationDetailOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:var(--z-modal-backdrop, 1040);">
    <div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:8px; width:min(980px, 92vw); max-height:80vh; display:flex; flex-direction:column; z-index:var(--z-modal, 1050);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #eee;">
            <h4 id="migrationDetailTitle" style="margin:0; font-size:16px;">错误详情</h4>
            <button type="button" id="closeMigrationDetailBtn" class="btn btn-outline btn-sm">关闭</button>
        </div>
        <div style="padding:16px; overflow:auto; flex:1;">
            <table class="table migration-detail-table">
                <thead>
                <tr>
                    <th id="migrationDetailKeyHeader" style="width:280px;">标识/主键</th>
                    <th>错误信息</th>
                </tr>
                </thead>
                <tbody id="migrationDetailTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<style>
    .migration-detail-table .migration-error-cell {
        max-height: 180px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.5;
    }
</style>

<script>
    $(document).ready(function () {
        window.backIndexPage = function () {
            doLoader('/database-syncer/list');
        };

        var currentTaskId = '[[${taskId}]]';

        $('#detailTaskSelect').dbSelect({
            type: 'single',
            onSelect: function (selected) {
                var selectedId = selected.value || selected;
                if (selectedId && selectedId !== currentTaskId) {
                    currentTaskId = selectedId;
                    doLoader('/database-syncer/page/detail?id=' + currentTaskId);
                }
            }
        });

        $('#refreshBtn').click(function () {
            var api = $('#detailTaskSelect').data('dbSelect');
            if (api && api.getValues().length > 0) {
                currentTaskId = api.getValues()[0];
            }
            resultPagination.doSearch(buildSearchParams());
        });

        function getFilterValue(selector) {
            var api = $(selector).data('dbSelect');
            if (api && typeof api.getValues === 'function' && api.getValues().length > 0) {
                return api.getValues()[0] || '';
            }
            return $(selector).val() || '';
        }

        function buildSearchParams() {
            return {
                taskId: currentTaskId,
                detailType: getFilterValue('#detailTypeFilter'),
                detailStatus: getFilterValue('#detailStatusFilter')
            };
        }

        function triggerSearch() {
            resultPagination.doSearch(buildSearchParams(), 1);
        }

        function initFilterSelect(selector) {
            $(selector).dbSelect({
                type: 'single',
                onSelect: function () {
                    triggerSearch();
                }
            });
        }

        initFilterSelect('#detailTypeFilter');
        initFilterSelect('#detailStatusFilter');

        var typeTextMap = {
            rowData: '数据迁移',
            tableSchema: '表结构'
        };
        var typeBadgeMap = {
            rowData: 'badge-primary',
            tableSchema: 'badge-info'
        };

        function formatSourceDb(row) {
            var db = row.sourceDatabase || '';
            var schema = row.sourceSchema || '';
            if (db && schema) {
                return escapeHtml(db) + ' / ' + escapeHtml(schema);
            }
            return escapeHtml(db || schema || '-');
        }

        function formatFailTotal(fail) {
            var n = Number(fail) || 0;
            if (n > 0) {
                return '<span class="badge badge-error">' + n + '</span>';
            }
            return '<span class="badge badge-success">0</span>';
        }

        var migrationDetailCache = {};

        function closeMigrationDetail() {
            $('#migrationDetailOverlay').hide();
            $('#migrationDetailTableBody').empty();
        }

        function formatPrimaryKey(primaryKey) {
            if (!primaryKey || typeof primaryKey !== 'object') {
                return '';
            }
            var pairs = [];
            Object.keys(primaryKey).forEach(function (name) {
                pairs.push(name + '=' + primaryKey[name]);
            });
            return pairs.join(',');
        }

        function parseMigrationDetailRows(row) {
            var typeCode = row.type || '';
            var content = row.content || '';
            var rows = [];

            if (content) {
                try {
                    var detail = typeof content === 'string' ? JSON.parse(content) : content;
                    if (detail && Array.isArray(detail.records)) {
                        detail.records.forEach(function (record) {
                            var key = record.identifier || formatPrimaryKey(record.primaryKey) || '-';
                            rows.push({
                                key: key,
                                error: record.error || '-'
                            });
                        });
                        return rows;
                    }
                } catch (e) {
                    // 兼容旧版文本格式
                }
            }

            if (typeCode === 'rowData') {
                if (!content) {
                    return rows;
                }
                content.split('\n').forEach(function (line) {
                    line = (line || '').trim();
                    if (!line) {
                        return;
                    }
                    var errorIndex = line.indexOf(';error=');
                    if (errorIndex >= 0) {
                        rows.push({
                            key: line.substring(0, errorIndex),
                            error: line.substring(errorIndex + 7)
                        });
                    } else if (line.indexOf('error=') === 0) {
                        rows.push({ key: '-', error: line.substring(6) });
                    } else {
                        rows.push({ key: '-', error: line });
                    }
                });
                return rows;
            }

            rows.push({
                key: row.sourceTable || row.targetTable || '-',
                error: content || '迁移成功'
            });
            return rows;
        }

        window.showMigrationDetail = function (detailId) {
            var row = migrationDetailCache[detailId];
            if (!row) {
                bootGrowl('未找到详情数据', 'warning');
                return;
            }

            var typeCode = row.type || '';
            var isRowData = typeCode === 'rowData';
            $('#migrationDetailTitle').text(isRowData ? '数据迁移详情' : '结构迁移详情');
            $('#migrationDetailKeyHeader').text(isRowData ? '主键' : '表名');

            var detailRows = parseMigrationDetailRows(row);
            var bodyHtml = '';
            if (detailRows.length === 0) {
                bodyHtml = '<tr><td colspan="2" class="text-center text-gray-400">暂无错误详情</td></tr>';
            } else {
                detailRows.forEach(function (item) {
                    var errorText = item.error || '-';
                    bodyHtml += '<tr>'
                        + '<td>' + escapeHtml(item.key || '-') + '</td>'
                        + '<td><div class="migration-error-cell">' + escapeHtml(errorText) + '</div></td>'
                        + '</tr>';
                });
            }
            $('#migrationDetailTableBody').html(bodyHtml);
            $('#migrationDetailOverlay').show();
        };

        $('#closeMigrationDetailBtn').on('click', closeMigrationDetail);
        $('#migrationDetailOverlay').on('click', function (e) {
            if (e.target === this) {
                closeMigrationDetail();
            }
        });

        var resultPagination = new PaginationManager({
            requestUrl: '/database-syncer/searchResult',
            tableBodySelector: '#detail-result-table',
            params: buildSearchParams(),
            pageSize: 10,
            customPageSize: true,
            customPageSizeItems: [5, 10, 20, 50, 100, 200],
            storageKey: 'database-syncer-detail',
            renderRow: function (row, index) {
                var typeCode = row.type || '';
                var badgeClass = typeBadgeMap[typeCode] || 'badge-info';
                var typeText = typeTextMap[typeCode] || typeCode;
                var sourceTotal = row.sourceTotal;
                if (sourceTotal === undefined || sourceTotal === null || sourceTotal === '') {
                    sourceTotal = typeCode === 'rowData' ? '-' : '<span class="text-gray-400">-</span>';
                }
                var detailId = row.id != null ? String(row.id) : ('detail_' + index);
                migrationDetailCache[detailId] = {
                    type: typeCode,
                    sourceTable: row.sourceTable || '',
                    targetTable: row.targetTable || '',
                    content: row.content || ''
                };
                return '<tr>'
                    + '<td>' + index + '</td>'
                    + '<td><span class="badge ' + badgeClass + '">' + escapeHtml(typeText) + '</span></td>'
                    + '<td>' + formatSourceDb(row) + '</td>'
                    + '<td>' + escapeHtml(row.sourceTable || '-') + '</td>'
                    + '<td>' + escapeHtml(row.targetDatabase || '-') + '</td>'
                    + '<td>' + escapeHtml(row.targetTable || '-') + '</td>'
                    + '<td>' + sourceTotal + '</td>'
                    + '<td>' + (row.successTotal != null ? row.successTotal : '-') + '</td>'
                    + '<td>' + formatFailTotal(row.failTotal) + '</td>'
                    + '<td>' + formatDate(row.updateTime || '') + '</td>'
                    + '<td><button type="button" class="table-action-btn view diff-detail-btn" title="查看详情" onclick="showMigrationDetail(\'' + detailId.replace(/'/g, '') + '\')"><i class="fa fa-eye"></i></button></td>'
                    + '</tr>';
            },
            emptyHtml: '<td colspan="11" class="text-center"><i class="fa fa-database empty-icon"></i>'
                + '<p class="empty-text">暂无迁移结果</p>'
                + '<p class="empty-description">任务执行完成后将在此展示各表迁移明细</p></td>'
        });
    });
</script>
</html>
