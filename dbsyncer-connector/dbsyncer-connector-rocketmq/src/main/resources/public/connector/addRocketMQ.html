<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content">
    <div class="grid grid-cols-2">
        <div class="form-item">
            <label class="form-label">
                NameServer<i class="fa fa-question-circle" title="多个使用英文分号，例如：192.168.1.100:9876;192.168.1.200:9876"></i>
                <strong class="text-primary">*</strong>
            </label>
            <div class="form-control-area">
                <input class="form-control" name="url" type="text" maxlength="1024" required placeholder="127.0.0.1:9876"
                       th:value="${connector?.config?.url}?:'127.0.0.1:9876'"/>
            </div>
        </div>
    </div>

    <div class="grid mt-4">
        <div class="form-item">
            <label class="form-label">连接参数</label>
            <div class="form-control-area">
                <textarea name="properties" class="form-control" maxlength="1024" rows="3"
                          th:text="${connector?.config?.propertiesText}"></textarea>
            </div>
        </div>
    </div>

    <div class="grid mt-4">
        <div class="form-item">
            <label class="form-label">消费者参数<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <textarea name="consumerProperties" class="form-control" maxlength="1024" rows="6" required>
[[${connector?.config?.extInfo?.consumerProperties ?:
'consumeThreadMin=5
consumeThreadMax=20
consumeMessageBatchMaxSize=32
pullBatchSize=32
maxReconsumeTimes=3'}]]</textarea>
            </div>
        </div>
    </div>

    <div class="grid mt-4">
        <div class="form-item">
            <label class="form-label">生产者参数<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <textarea name="producerProperties" class="form-control" maxlength="1024" rows="6" required>
[[${connector?.config?.extInfo?.producerProperties ?:
'producerGroup=dbsyncer-producer
sendMsgTimeout=3000
retryTimesWhenSendFailed=2
compressMsgBodyOverHowmuch=4096
maxMessageSize=4194304'}]]</textarea>
            </div>
        </div>
    </div>

    <div class="grid mt-4">
        <div class="form-item">
            <label class="form-label">说明</label>
            <div class="form-control-area text-xs text-muted">
                消息体格式与 Kafka 连接器一致，包含 table、event、data 字段；源端增量订阅需配置消费组 groupId，可选 tags 过滤。
            </div>
        </div>
    </div>
</div>

</html>
