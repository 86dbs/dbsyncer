<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content">
    <div class="grid grid-cols-2">
        <div class="form-item">
            <label class="form-label">主机<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="host" type="text" maxlength="100" required placeholder="127.0.0.1" th:value="${connector?.config?.host}?: '127.0.0.1'"/>
            </div>
        </div>
        <div class="form-item">
            <label class="form-label">端口<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="port" type="number" maxlength="64" required placeholder="2881" th:value="${connector?.config?.port}?: '2881'"/>
            </div>
        </div>
        <div class="form-item">
            <label class="form-label">用户名<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="username" type="text" maxlength="64" required placeholder="root@tenant" th:value="${connector?.config?.username}"/>
            </div>
        </div>
        <div class="form-item">
            <label class="form-label">密码<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="password" type="password" maxlength="64" required placeholder="请输入密码" th:value="${connector?.config?.password}"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">Binlog 主机
                <i class="fa fa-question-circle" title="OceanBase Binlog 服务地址，留空则使用上方主机"></i>
            </label>
            <div class="form-control-area">
                <input class="form-control" name="binlogHost" type="text" maxlength="100" placeholder="127.0.0.1"
                       th:value="${connector?.config?.extInfo?.binlogHost}"/>
            </div>
        </div>
        <div class="form-item">
            <label class="form-label">Binlog 端口
                <i class="fa fa-question-circle" title="Binlog Instance 端口（MySQL 协议），留空则使用上方 SQL 端口"></i>
            </label>
            <div class="form-control-area">
                <input class="form-control" name="binlogPort" type="number" min="1" max="65535" placeholder="Binlog Instance 端口"
                       th:value="${connector?.config?.extInfo?.binlogPort}"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">最大连接数<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="maxActive" type="number" required min="1" max="512"
                       th:value="${connector?.config?.maxActive}?:64" placeholder="默认64"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">有效期(毫秒)<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="keepAlive" type="number" required min="10000" max="120000"
                       th:value="${connector?.config?.keepAlive}?:60000" placeholder="默认60000"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">驱动</label>
            <div class="form-control-area">
                <input class="form-control" readonly="readonly" name="driverClassName" type="text"
                       th:value="${connector?.config?.driverClassName} ?: 'com.oceanbase.jdbc.Driver'"/>
            </div>
        </div>
    </div>

    <div class="grid mt-5">
        <div class="form-item">
            <label class="form-label">连接参数</label>
            <div class="form-control-area">
                <textarea name="properties" class="form-control" maxlength="1024" rows="5"
                          th:text="${connector?.config?.propertiesText} ?: 'rewriteBatchedStatements=true&amp;useUnicode=true&amp;characterEncoding=UTF8&amp;serverTimezone=Asia/Shanghai&amp;useSSL=false&amp;verifyServerCertificate=false&amp;autoReconnect=true&amp;failOverReadOnly=false&amp;tinyInt1isBit=false&amp;allowPublicKeyRetrieval=true&amp;cachePrepStmts=false'"></textarea>
            </div>
        </div>
    </div>

</div>

</html>
