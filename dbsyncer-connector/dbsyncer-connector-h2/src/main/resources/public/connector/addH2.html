<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<div th:fragment="content">
    <div class="grid grid-cols-2">
        <div class="form-item">
            <label class="form-label">数据库文件<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="serviceName" type="text" maxlength="256" required placeholder="./data/h2db" th:value="${connector?.config?.serviceName} ?: './data/h2db'"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">用户名<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="username" type="text" maxlength="64" required
                       th:value="${connector?.config?.username} ?: 'sa'" placeholder="默认 sa"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">密码</label>
            <div class="form-control-area">
                <input class="form-control" name="password" type="password" maxlength="64"
                       th:value="${connector?.config?.password} ?: ''" placeholder="默认为空"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">最大连接数<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="maxActive" type="number" required min="1" max="512"
                       th:value="${connector?.config?.maxActive}?:64" placeholder="默认64"/>
            </div>
        </div>

        <div class="form-item">
            <label class="form-label">有效期(毫秒)<strong class="text-primary">*</strong></label>
            <div class="form-control-area">
                <input class="form-control" name="keepAlive" type="number" required min="10000" max="120000"
                       th:value="${connector?.config?.keepAlive}?:30000" placeholder="默认30000"/>
            </div>
        </div>
    </div>

    <div class="grid mt-5">
        <div class="form-item">
            <label class="form-label">连接参数</label>
            <div class="form-control-area">
                <textarea name="properties" class="form-control" maxlength="1024" rows="5"
                          placeholder="MODE=MySQL&DB_CLOSE_DELAY=-1&DATABASE_TO_LOWER=TRUE&CASE_INSENSITIVE_IDENTIFIERS=TRUE"
                          th:text="${connector?.config?.propertiesText} ?: 'MODE=MySQL&DB_CLOSE_DELAY=-1&DATABASE_TO_LOWER=TRUE&CASE_INSENSITIVE_IDENTIFIERS=TRUE'"></textarea>
            </div>
        </div>
    </div>

    <div class="grid mt-5">
        <div class="form-item">
            <label class="form-label">驱动</label>
            <div class="form-control-area">
                <input class="form-control" readonly="true" name="driverClassName" type="text" th:value="${connector?.config?.driverClassName} ?: 'org.h2.Driver'" />
            </div>
        </div>
    </div>

</div>

</html>
